<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSMOSIS.EXE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier Prime', monospace;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        #app {
            width: 100%;
            max-width: 960px;
            border: 2px solid #ffffff;
            padding: 24px;
            position: relative;
            box-shadow: 0 0 24px rgba(255, 255, 255, 0.06);
        }

        #app::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255, 255, 255, 0.015) 2px,
                rgba(255, 255, 255, 0.015) 4px
            );
            pointer-events: none;
            z-index: 10;
        }

        #app > * { position: relative; z-index: 11; }

        h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.15em; margin-bottom: 24px; }

        .drop-zones { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

        .drop-zone {
            border: 2px solid #ffffff;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 0.1em;
            transition: background 0.1s;
            user-select: none;
        }

        .drop-zone:hover { background: rgba(255, 255, 255, 0.04); }
        .drop-zone.waiting { opacity: 0.4; }

        #display { display: block; width: 100%; border: 2px solid #ffffff; margin-bottom: 12px; }

        .dir-btn, button {
            background: none;
            border: 2px solid #ffffff;
            color: #ffffff;
            font-family: 'Courier Prime', monospace;
            font-size: 12px;
            padding: 6px 12px;
            cursor: pointer;
            letter-spacing: 0.08em;
            transition: background 0.1s, color 0.1s;
        }

        button:hover, .dir-btn:hover { background: rgba(255, 255, 255, 0.08); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .dir-btn.active { background: #ffffff; color: #0a0a0a; }
        button.active { background: #ffffff; color: #0a0a0a; }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 160px;
            height: 2px;
            background: #ffffff;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ffffff;
            cursor: pointer;
            border: 2px solid #0a0a0a;
            outline: 2px solid #ffffff;
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: #ffffff;
            cursor: pointer;
            border: 2px solid #0a0a0a;
            outline: 2px solid #ffffff;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>OSMOSIS.EXE</h1>
        <div class="drop-zones">
            <div id="dropA" class="drop-zone waiting">[ DROP VIDEO A ]</div>
            <div id="dropB" class="drop-zone waiting">[ DROP VIDEO B ]</div>
        </div>
        <canvas id="display"></canvas>
        <div id="meterLabel" style="font-size:12px;letter-spacing:0.1em;margin-bottom:6px;">CONTAMINATION: 0%</div>
        <div style="border:1px solid #ffffff;width:100%;height:10px;margin-bottom:20px;">
            <div id="meterBar" style="height:100%;background:#ffffff;width:0%;transition:width 0.4s;"></div>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:16px;">
            <button id="dirAtoB" class="dir-btn">A→B</button>
            <button id="dirBidi" class="dir-btn active">BIDI</button>
            <button id="dirBtoA" class="dir-btn">B→A</button>
        </div>
        <button id="resetBtn">RESET</button>
        <div style="display:flex;align-items:center;gap:10px;margin-top:16px;">
            <span style="font-size:11px;letter-spacing:0.08em;opacity:0.6;">BLEED</span>
            <input type="range" id="bleedSlider" min="0.001" max="0.1" step="0.001" value="0.01">
            <span id="bleedDisplay" style="font-size:11px;letter-spacing:0.06em;">0.010</span>
        </div>
        <button id="playBtn" disabled>PLAY</button>
        <button id="recBtn" disabled style="margin-left:8px;">REC</button>
        <div id="debugPanel" style="font-size:11px;opacity:0.4;letter-spacing:0.06em;margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.15);">
            bleed=0.010 &nbsp; fps=— &nbsp; contamination=0%
        </div>
    </div>

    <input type="file" id="fileA" accept="video/*" style="display:none">
    <input type="file" id="fileB" accept="video/*" style="display:none">
    <video id="videoA" style="display:none" loop crossorigin="anonymous"></video>
    <video id="videoB" style="display:none" loop crossorigin="anonymous"></video>

    <script>
        const videoA = document.getElementById('videoA');
        const videoB = document.getElementById('videoB');
        const playBtn = document.getElementById('playBtn');
        const recBtn = document.getElementById('recBtn');
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;

        let readyA = false, readyB = false;
        let isPlaying = false;

        const INTERNAL_W = 854, INTERNAL_H = 480;

        const displayCanvas = document.getElementById('display');
        const displayCtx = displayCanvas.getContext('2d');
        displayCanvas.width = INTERNAL_W;
        displayCanvas.height = INTERNAL_H;

        const offA = new OffscreenCanvas(INTERNAL_W, INTERNAL_H);
        const offB = new OffscreenCanvas(INTERNAL_W, INTERNAL_H);
        const ctxA = offA.getContext('2d');
        const ctxB = offB.getContext('2d');

        let contaminationBuffer = null;
        let bufInitialized = false;
        let originalSnapshot = null; // pixel snapshot of videoA at buffer init — used by contamination meter

        let bleedRate = 0.01;
        let direction = 'BIDIRECTIONAL'; // 'A_TO_B' | 'B_TO_A' | 'BIDIRECTIONAL'
        let lastFrameTime = 0;
        let currentFps = 0;
        let frameSkipActive = false;
        let frameSkipToggle = false;

        function initBuffer() {
            ctxA.drawImage(videoA, 0, 0, INTERNAL_W, INTERNAL_H);
            contaminationBuffer = ctxA.getImageData(0, 0, INTERNAL_W, INTERNAL_H);
            originalSnapshot = new Uint8ClampedArray(contaminationBuffer.data);
            bufInitialized = true;
        }

        function bleedPixels(dataA, dataB, buf) {
            for (let i = 0; i < INTERNAL_W * INTERNAL_H; i++) {
                const r = i * 4, g = r + 1, b = r + 2;
                const lumA = 0.299 * dataA[r] + 0.587 * dataA[g] + 0.114 * dataA[b];
                const lumB = 0.299 * dataB[r] + 0.587 * dataB[g] + 0.114 * dataB[b];

                if ((direction === 'A_TO_B' || direction === 'BIDIRECTIONAL') && lumA > lumB) {
                    const t = bleedRate * ((lumA - lumB) / 255);
                    buf[r] += (dataA[r] - buf[r]) * t;
                    buf[g] += (dataA[g] - buf[g]) * t;
                    buf[b] += (dataA[b] - buf[b]) * t;
                }
                if ((direction === 'B_TO_A' || direction === 'BIDIRECTIONAL') && lumB > lumA) {
                    const t = bleedRate * ((lumB - lumA) / 255);
                    buf[r] += (dataB[r] - buf[r]) * t;
                    buf[g] += (dataB[g] - buf[g]) * t;
                    buf[b] += (dataB[b] - buf[b]) * t;
                }
            }
        }

        function computeContaminationPercent(threshold = 30) {
            if (!bufInitialized || !originalSnapshot) return 0;
            const buf = contaminationBuffer.data;
            let altered = 0;
            for (let i = 0; i < 1000; i++) {
                const idx = Math.floor(Math.random() * (INTERNAL_W * INTERNAL_H)) * 4;
                const dr = Math.abs(buf[idx]   - originalSnapshot[idx]);
                const dg = Math.abs(buf[idx+1] - originalSnapshot[idx+1]);
                const db = Math.abs(buf[idx+2] - originalSnapshot[idx+2]);
                if (dr + dg + db > threshold) altered++;
            }
            return altered / 1000;
        }

        function renderFrame(timestamp) {
            requestAnimationFrame(renderFrame);
            if (!isPlaying || !bufInitialized) return;

            if (lastFrameTime > 0) {
                const delta = timestamp - lastFrameTime;
                currentFps = Math.round(1000 / delta);
                frameSkipActive = currentFps < 25;
            }
            lastFrameTime = timestamp;

            ctxA.drawImage(videoA, 0, 0, INTERNAL_W, INTERNAL_H);
            ctxB.drawImage(videoB, 0, 0, INTERNAL_W, INTERNAL_H);

            const dataA = ctxA.getImageData(0, 0, INTERNAL_W, INTERNAL_H).data;
            const dataB = ctxB.getImageData(0, 0, INTERNAL_W, INTERNAL_H).data;
            const buf = contaminationBuffer.data;

            if (frameSkipActive) {
                frameSkipToggle = !frameSkipToggle;
                if (!frameSkipToggle) bleedPixels(dataA, dataB, buf);
            } else {
                bleedPixels(dataA, dataB, buf);
            }

            displayCtx.putImageData(contaminationBuffer, 0, 0);
        }

        requestAnimationFrame(renderFrame);

        const meterLabel = document.getElementById('meterLabel');
        const meterBar = document.getElementById('meterBar');
        const debugPanel = document.getElementById('debugPanel');

        function updateDebug(pct) {
            debugPanel.innerHTML = `bleed=${bleedRate.toFixed(3)} &nbsp; fps=${currentFps || '—'} &nbsp; contamination=${pct}%`;
        }

        setInterval(() => {
            if (!isPlaying || !bufInitialized) return;
            const pct = Math.round(computeContaminationPercent() * 100);
            meterLabel.textContent = `CONTAMINATION: ${pct}%`;
            meterBar.style.width = `${pct}%`;
            updateDebug(pct);
        }, 1000);

        const dirMap = {
            'A_TO_B': document.getElementById('dirAtoB'),
            'BIDIRECTIONAL': document.getElementById('dirBidi'),
            'B_TO_A': document.getElementById('dirBtoA'),
        };

        Object.entries(dirMap).forEach(([dir, btn]) => {
            btn.addEventListener('click', () => {
                direction = dir;
                Object.values(dirMap).forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            if (!bufInitialized) return;
            ctxA.drawImage(videoA, 0, 0, INTERNAL_W, INTERNAL_H);
            contaminationBuffer = ctxA.getImageData(0, 0, INTERNAL_W, INTERNAL_H);
            originalSnapshot = new Uint8ClampedArray(contaminationBuffer.data);
        });

        const bleedSlider = document.getElementById('bleedSlider');
        const bleedDisplay = document.getElementById('bleedDisplay');

        bleedSlider.addEventListener('input', () => {
            bleedRate = parseFloat(bleedSlider.value);
            bleedDisplay.textContent = bleedRate.toFixed(3);
        });

        function checkReady() {
            if (readyA && readyB) playBtn.disabled = false;
        }

        function loadVideo(video, file, zone, onReady) {
            zone.textContent = 'LOADING...';
            if (video.src && video.src.startsWith('blob:')) URL.revokeObjectURL(video.src);
            video.src = URL.createObjectURL(file);
            video.oncanplay = () => {
                const label = zone.id === 'dropA' ? '[ VIDEO A — READY ]' : '[ VIDEO B — READY ]';
                zone.textContent = label;
                zone.classList.remove('waiting');
                onReady();
            };
            video.load();
        }

        function setupZone(zoneId, fileInputId, video, onReady) {
            const zone = document.getElementById(zoneId);
            const input = document.getElementById(fileInputId);
            zone.addEventListener('click', () => input.click());
            input.addEventListener('change', e => {
                if (e.target.files[0]) loadVideo(video, e.target.files[0], zone, onReady);
            });
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('drop', e => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('video/')) loadVideo(video, file, zone, onReady);
            });
        }

        setupZone('dropA', 'fileA', videoA, () => { readyA = true; checkReady(); });
        setupZone('dropB', 'fileB', videoB, () => { readyB = true; checkReady(); });

        playBtn.addEventListener('click', () => {
            if (!isPlaying) {
                if (!bufInitialized) initBuffer();
                videoA.play();
                videoB.play();
                isPlaying = true;
                playBtn.textContent = 'STOP';
                recBtn.disabled = false;
            } else {
                if (isRecording) stopRecording();
                videoA.pause();
                videoB.pause();
                isPlaying = false;
                playBtn.textContent = 'PLAY';
                recBtn.disabled = true;
                recBtn.textContent = 'REC';
            }
        });

        function startRecording() {
            const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')
                ? 'video/webm;codecs=vp9'
                : 'video/webm';
            const stream = displayCanvas.captureStream(30);
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream, { mimeType });
            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'osmosis.webm';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 100);
            };
            mediaRecorder.start();
            isRecording = true;
            recBtn.textContent = 'STOP REC';
            recBtn.classList.add('active');
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            isRecording = false;
            recBtn.textContent = 'REC';
            recBtn.classList.remove('active');
        }

        recBtn.addEventListener('click', () => {
            if (!isRecording) startRecording();
            else stopRecording();
        });

        // Freeze shorter video at its last frame instead of looping
        videoA.removeAttribute('loop');
        videoB.removeAttribute('loop');
        videoA.addEventListener('ended', () => videoA.pause());
        videoB.addEventListener('ended', () => videoB.pause());
    </script>
</body>
</html>
